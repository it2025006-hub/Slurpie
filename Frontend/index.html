<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slurpie | Login & Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@300;400;500&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
</head>
<body>

<!-- FLOATING FOOD EMOJI BACKGROUND -->
<div class="food-bg">
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
</div>

  <div class="bg-pattern"></div>

  <div class="auth-page">

    <!-- SIGN UP SECTION -->
    <div class="card signup">
      <h1>🍰 Join Slurpie</h1>
      <p class="subtitle">Create an account & spread food love 🤍</p>

      <form id="signupForm">

        <label>👤 Name <span class="mandatory">* </span></label>
        <input id="signupName" type="text" placeholder="Enter your name" required>

        <label>📞 Phone No. <span class="mandatory">* </span></label>
        <input id="signupPhone" type="tel" placeholder="Enter your phone number" required>

        <label>📧 Mail <span class="mandatory">* </span></label>
        <input id="signupEmail" type="email" placeholder="Enter your email" required>

        <label>🔒 Password <span class="mandatory">* </span></label>
        <input id="signupPassword" type="password" placeholder="Create a password" required>

        <button class="btn signup-btn">Sign Up</button>

      </form>
    </div>

    <!-- LOGIN SECTION -->
    <div class="card login">
      <h1>🍞 Welcome Back</h1>
      <p class="subtitle">Already part of Slurpie? Log in 😊</p>

      <form id="loginForm">

        <label>📧 Mail <span class="mandatory">* </span></label>
        <input id="loginEmail" type="email" placeholder="Enter your email" required>

        <label>🔒 Password <span class="mandatory">* </span></label>
        <input id="loginPassword" type="password" placeholder="Enter your password" required>

        <button class="btn login-btn">Login</button>

      </form>
    </div>

  </div>

<script>
const API = "http://localhost:5000/api/auth";

/* SIGNUP */
document.getElementById("signupForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("signupName").value;
  const phone = document.getElementById("signupPhone").value;
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;

  try {
    const res = await fetch(`${API}/signup`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        phone,
        email,
        password
      })
    });

    const data = await res.json();

    if(res.ok){
      window.location.href="home.html";
    }else{
      alert(data.message);
    }

  } catch(err){
    console.error(err);
    alert("Server error");
  }
});

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    const data = await res.json();

    if(res.ok){
      localStorage.setItem("token",data.token);
      window.location.href="home.html";
    }else{
      alert(data.message || "Wrong email or password");
    }

  } catch(err){
    console.error(err);
    alert("Server error");
  }
});
</script>

<!-- INJECT GLOBAL CHATBOT AND BACK BUTTON -->
<script src="global-ui.js"></script>

</body>
</html>
