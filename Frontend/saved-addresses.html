<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Saved Addresses | Slurpie</title>
<link rel="stylesheet" href="saved-addresses.css">
</head>

<body>

<button class="back-btn" onclick="goHome()">⬅️ Back</button>

<div class="page">

<!-- LEFT PANEL -->

<div class="left-panel">

<h2>📍 Save New Address</h2>

<div id="map"></div>

<div class="map-controls">
<button id="locateBtn">Locate My Position</button>
</div>

<div class="form">

<div class="input-group">
<input id="address" required placeholder=" ">
<label>Write Your Full Address</label>
</div>

<div class="input-group">
<input id="city" required placeholder=" ">
<label>City</label>
</div>

<div class="input-group">
<input id="pincode" required placeholder=" ">
<label>Pincode</label>
</div>

<input type="hidden" id="label" value="Home">

<div class="label-buttons">
<button class="label-btn active" data-value="Home">🏠 Home</button>
<button class="label-btn" data-value="Work">💼 Work</button>
<button class="label-btn" data-value="Pickup Point">📦 Pickup</button>
</div>

<button id="saveAddress">Save Address</button>

<p id="saveMsg"></p>

</div>

</div>


<!-- RIGHT PANEL -->

<div class="right-panel">

<h2>📦 Your Saved Addresses</h2>

<div id="addressList"></div>

</div>

</div>


<script>

let map
let marker
let geocoder

const token = localStorage.getItem("token")

function goHome(){
window.location.href="home.html"
}


/* LABEL BUTTONS */

document.querySelectorAll(".label-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".label-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
document.getElementById("label").value=btn.dataset.value
}
})


/* INITIALIZE MAP */

function initMap(){

geocoder = new google.maps.Geocoder()

map = new google.maps.Map(document.getElementById("map"),{
center:{lat:22.5726,lng:88.3639},
zoom:13
})

marker = new google.maps.Marker({
position:map.getCenter(),
map:map,
draggable:true
})

detectUserLocation()

marker.addListener("dragend", ()=>{
const position = marker.getPosition()
getAddress(position)
loadAddresses()
})

map.addListener("click",(e)=>{
marker.setPosition(e.latLng)
getAddress(e.latLng)
loadAddresses()
})

}


/* AUTO DETECT LOCATION */

function detectUserLocation(){

navigator.geolocation.getCurrentPosition((pos)=>{

const lat = pos.coords.latitude
const lng = pos.coords.longitude

const location = new google.maps.LatLng(lat,lng)

map.setCenter(location)
map.setZoom(16)

marker.setPosition(location)

getAddress(location)

})

}


/* GET ADDRESS */

function getAddress(latlng){

let location

if(typeof latlng.lat === "function"){
location = {lat:latlng.lat(), lng:latlng.lng()}
}else{
location = latlng
}

geocoder.geocode({location:location},(results,status)=>{

if(status==="OK" && results[0]){

document.getElementById("address").value = results[0].formatted_address

let components = results[0].address_components

let city=""
let pincode=""

components.forEach(c=>{

if(
c.types.includes("locality") ||
c.types.includes("administrative_area_level_2") ||
c.types.includes("administrative_area_level_1")
){
city = c.long_name
}

if(c.types.includes("postal_code")){
pincode = c.long_name
}

})

document.getElementById("city").value = city
document.getElementById("pincode").value = pincode

}

})

}


/* LOCATE BUTTON */

document.getElementById("locateBtn").onclick = ()=>{

navigator.geolocation.getCurrentPosition((pos)=>{

const lat = pos.coords.latitude
const lng = pos.coords.longitude

const location = new google.maps.LatLng(lat,lng)

map.setCenter(location)
map.setZoom(16)

marker.setPosition(location)

getAddress(location)

})

}


/* SAVE ADDRESS */

document.getElementById("saveAddress").onclick = async ()=>{

const address = document.getElementById("address").value
const city = document.getElementById("city").value
const pincode = document.getElementById("pincode").value
const label = document.getElementById("label").value

const latitude = marker.getPosition().lat()
const longitude = marker.getPosition().lng()

const res = await fetch("http://localhost:5000/api/address/add",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},

body:JSON.stringify({
address,
city,
pincode,
label,
latitude,
longitude
})

})

const data = await res.json()

document.getElementById("saveMsg").innerText = data.message

setTimeout(()=>{
location.reload()
},800)

}


/* DELETE ADDRESS */

async function deleteAddress(id){

const card = event.target.closest(".address-card")
card.classList.add("removing")

setTimeout(async ()=>{

await fetch(`http://localhost:5000/api/address/${id}`,{
method:"DELETE",
headers:{Authorization:`Bearer ${token}`}
})

loadAddresses()

},300)

}


/* SET DEFAULT */

async function setDefault(id){

await fetch(`http://localhost:5000/api/address/set-default/${id}`,{
method:"PUT",
headers:{Authorization:`Bearer ${token}`}
})

loadAddresses()

}


/* DISTANCE FUNCTION */

function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371

const dLat = (lat2-lat1) * Math.PI/180
const dLon = (lon2-lon1) * Math.PI/180

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI/180) *
Math.cos(lat2 * Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2)

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))

return (R*c).toFixed(2)

}


/* LOAD ADDRESSES */

async function loadAddresses(){

const res = await fetch("http://localhost:5000/api/address/my",{
headers:{ Authorization:`Bearer ${token}` }
})

let addresses = await res.json()

addresses.sort((a,b)=> b.defaultAddress - a.defaultAddress)

const container = document.getElementById("addressList")

container.innerHTML=""

addresses.forEach(a=>{

const markerLat = marker.getPosition().lat()
const markerLng = marker.getPosition().lng()

const distance = calculateDistance(
markerLat,
markerLng,
a.latitude,
a.longitude
)

container.innerHTML += `

<div class="address-card ${a.defaultAddress ? "default-card":""}">

<div class="card-header">
<h3>${a.label} ${a.defaultAddress ? "⭐" : ""}</h3>
<button class="delete-btn" onclick="deleteAddress('${a._id}')">Delete</button>
</div>

<p>${a.address}</p>
<p>${a.city}</p>
<p>${a.pincode}</p>

<p class="distance">📍 ${distance} km from selected point</p>

<div class="card-footer">
<button class="default-btn" onclick="setDefault('${a._id}')">
Set as Default
</button>
</div>

</div>

`

})

}

loadAddresses()

</script>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBfakHLx6LMr19kFFph2n80qsu773OeRQA&callback=initMap&libraries=places" async defer></script>

</body>
</html>
