<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Foods | Slurpie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@300;400;500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="available-foods.css">
  <link rel="stylesheet" href="dark.css">

</head>
<body>

<!-- FLOATING FOOD EMOJI BACKGROUND -->
<div class="food-bg">
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
<span>🍕</span><span>🍔</span><span>🍟</span><span>🍜</span><span>🍩</span>
<span>🍪</span><span>🍣</span><span>🍗</span><span>🍞</span><span>🥐</span>
</div>

<div class="bg-pattern"></div>

<!-- GO TO CART -->
<button class="cart-btn" onclick="goToCart()">
  🛒 CART (<span id="cartCount">0</span>)
</button>

<header>
  <h1>🍽️ ALL AVAILABLE FOODS NEAR YOU</h1>
  <p>Fresh surplus food, shared with care 🤍</p>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="🔍 Search food..." onkeyup="searchFood()">
  <button id="vegToggle" class="veg-btn fancy-veg" onclick="toggleVeg()">
    🟢 PURE VEG <span class="status">OFF</span>
  </button>
</div>

<section class="food-scroll">
<div class="food-grid" id="foodGrid">
  <div style="text-align:center; grid-column:1/-1; color:#8a5a44;">
    <p>Loading delicious foods...</p>
  </div>
</div>
</section>

<!-- TOAST -->
<div id="toast" class="toast">✅ Added to cart</div>

<script>
let allFoods = [];
let userLat = null;
let userLng = null;

/* HAVERSINE FORMULA */
function calculateDistance(lat1, lon1, lat2, lon2) {
  if(!lat1 || !lon1 || !lat2 || !lon2) return null;
  const R = 6371; // Earth's radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return (R * c).toFixed(1);
}

/* FETCH DATA: ADDRESS THEN FOODS */
async function fetchFoods() {
  try {
    const token = localStorage.getItem("token");
    
    // 1. Try fetching user's default address first
    if(token){
      try{
        const addrRes = await fetch("http://localhost:5000/api/address/my",{
          headers: {"Authorization": "Bearer " + token}
        });
        if(addrRes.ok){
          const addresses = await addrRes.json();
          const defAddr = addresses.find(a => a.defaultAddress === true);
          if(defAddr && defAddr.latitude && defAddr.longitude){
            userLat = defAddr.latitude;
            userLng = defAddr.longitude;
          }
        }
      }catch(err){ console.log("Address fetch failed", err); }
    }

    // 2. Fetch all available foods
    const res = await fetch("http://localhost:5000/api/food/all");
    const foods = await res.json();
    allFoods = foods;
    renderFoods();
  } catch (err) {
    console.error("Error fetching foods:", err);
    document.getElementById("foodGrid").innerHTML = `
      <div style="text-align:center; grid-column:1/-1; color:#c0392b;">
        <p>Failed to load foods. Please ensure the backend is running.</p>
      </div>`;
  }
}

/* RENDER FOODS */
function renderFoods() {
  const container = document.getElementById("foodGrid");
  container.innerHTML = "";

  if (allFoods.length === 0) {
    container.innerHTML = `
      <div style="text-align:center; grid-column:1/-1; color:#8a5a44;">
        <p>No foods available right now. Check back later! 🍽️</p>
      </div>`;
    return;
  }

  allFoods.forEach((food, index) => {
    // Determine if veg or non-veg based on foodType from DB
    const isVeg = food.foodType.toLowerCase() === "veg";
    const vegBadgeClass = isVeg ? "badge veg" : "badge nonveg";
    const vegBadgeText = isVeg ? "VEG" : "NON-VEG";
    const vegDataAttr = isVeg ? "yes" : "no";
    
    // Set fallback image if none provided
    const imageSrc = food.foodImage || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=400&fit=crop";

    // Format animation delay
    const delay = (index * 0.05).toFixed(2);

    // Calculate distance if coordinates exist
    let locationHTML = `<p>📍 ${food.pickupAddress.substring(0,20)}...</p>`;
    if (userLat && userLng && food.latitude && food.longitude) {
      const dist = calculateDistance(userLat, userLng, food.latitude, food.longitude);
      if (dist) locationHTML = `<p style="color:#2f7a4f; font-weight:600;">📍 ${dist} km away</p>`;
    }

    const cardHTML = `
      <div class="food-card" data-veg="${vegDataAttr}" data-name="${food.foodName.toLowerCase()}" onclick="expandCard(this)" style="animation-delay: ${delay}s">
        <div class="card-top">
          <h2>🍽️ ${food.foodName} <span class="${vegBadgeClass}">${vegBadgeText}</span></h2>
          <span class="price">₹${food.price}</span>
        </div>
        <img src="${imageSrc}" alt="${food.foodName}">
        <div class="details">
          <p>⚖️ ${food.itemWeight}</p>
          <p>⏳ ${food.expireDays > 0 ? food.expireDays + ' days' : ''} ${food.expireHours > 0 ? food.expireHours + ' hrs' : ''}</p>
          ${locationHTML}
        </div>
        <button class="cart-add-btn" onclick="addToCart(event, '${food.foodName.replace(/'/g, "\\'")}', ${food.price}, '${imageSrc}')">➕ ADD TO CART</button>
      </div>
    `;
    container.innerHTML += cardHTML;
  });
  
  // Apply current filters after rendering
  applyFilters();
}

// Call fetch on load
fetchFoods();

/* CLEAR CART ON REFRESH */
// localStorage.removeItem("cart"); // Commented out so cart persists

/* CARD EXPAND */
function expandCard(card){
  document.querySelectorAll('.food-card').forEach(c=>c.classList.remove('active'));
  card.classList.toggle('active');
}

/* VEG FILTER & SEARCH LOGIC */
let vegOnly = false;
let searchQuery = "";

function toggleVeg(){
  vegOnly = !vegOnly;
  document.getElementById("vegToggle").classList.toggle("active", vegOnly);
  document.querySelector('.status').textContent = vegOnly ? "ON" : "OFF";
  applyFilters();
}

function searchFood(){
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.food-card').forEach(card => {
    const matchesName = card.dataset.name.includes(searchQuery);
    const matchesVeg = !vegOnly || card.dataset.veg === "yes";
    
    if (matchesName && matchesVeg) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

/* CART */
function addToCart(event, name, price, img){
  event.stopPropagation();
  let cart=JSON.parse(localStorage.getItem("cart"))||[];
  const existing = cart.findIndex(i => i.name === name);
  if(existing > -1){
      cart[existing].qty = (cart[existing].qty || 1) + 1;
  } else {
      cart.push({name, price, img, qty: 1});
  }
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCartCount();
  showToast();
}

function updateCartCount(){
  let cart=JSON.parse(localStorage.getItem("cart"))||[];
  document.getElementById("cartCount").textContent=cart.length;
}

function goToCart(){
  window.location.href="cart.html";
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}

updateCartCount();
</script>
<!-- INJECT GLOBAL UI -->
<script src="global-ui.js"></script>
<script>
/* =========================
   DARK MODE FOLLOWER
   ========================= */
if (localStorage.getItem("nightMode") === "true") {
  document.body.classList.add("dark");
}
</script>

</body>
</html>
